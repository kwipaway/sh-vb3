<section class="start-section">

<h2>Tell Us About Yourself</h2>

<p>
Answer a few questions so we can guide you through the school enrollment process
and connect you with the right resources.
</p>


<form class="enrollment-form">


<label for="status">Military Status</label>

<select id="status" name="status">

<option>Veteran</option>
<option>Active Duty</option>
<option>Guard / Reserve</option>
<option>Spouse / Dependent</option>

</select>


<label for="goal">What are you trying to do?</label>

<select id="goal" name="goal">

<option>Apply to a School</option>
<option>Transfer Schools</option>
<option>Use Education Benefits</option>
<option>Speak With an Advisor</option>

</select>


<label for="term">Intended Start Term</label>

<select id="term" name="term">

<option>Fall 2026</option>
<option>Spring 2027</option>
<option>Summer 2026</option>
<option>Not Sure Yet</option>

</select>


<label>What help do you need?</label>

<div class="checkbox-group">

<label><input type="checkbox"> Admissions Help</label>

<label><input type="checkbox"> GI Bill / Tuition Assistance</label>

<label><input type="checkbox"> Transcript Evaluation</label>

<label><input type="checkbox"> Financial Aid / FAFSA</label>

<label><input type="checkbox"> Choosing a Degree Program</label>

</div>


<label>Name</label>
<input type="text" placeholder="Your Name">

<label>Email</label>
<input type="email" placeholder="Your Email">

<label>Phone</label>
<input type="tel" placeholder="Phone Number">

<button type="submit">Submit Enrollment Request</button>


</form>

</section>

</footer>
